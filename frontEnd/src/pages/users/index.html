<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios</title>
    <link rel="stylesheet" href="../../shared/css/global.css">
    <link rel="stylesheet" href="users.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Gestión de Usuarios</h1>
            <button id="add-user-btn" class="btn-primary">+ Nuevo Usuario</button>
        </header>

        <!-- Sección de búsqueda y filtros -->
        <div class="search-section">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Buscar por nombre, email o teléfono...">
                <button id="search-btn" class="btn-secondary">Buscar</button>
                <button id="reset-btn" class="btn-secondary btn-secondary-alt">Limpiar</button>
            </div>
            <div class="filter-bar">
                <select id="role-filter">
                    <option value="">Todos los roles</option>
                    <option value="admin">Administrador</option>
                    <option value="user">Usuario</option>
                </select>
                <select id="status-filter">
                    <option value="">Todos los estados</option>
                    <option value="active">Activo</option>
                    <option value="inactive">Inactivo</option>
                </select>
            </div>
        </div>

        <!-- Indicador de carga -->
        <div id="loading" class="loading hidden">Cargando...</div>

        <!-- Tabla de usuarios -->
        <div id="users-table"></div>

        <!-- Modal para crear/editar usuario -->
        <div id="user-modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2 id="modal-title">Registro de Usuario</h2>
                
                <!-- Mensajes del modal -->
                <div id="modal-error" class="alert alert-error hidden"></div>
                <div id="modal-success" class="alert alert-success hidden"></div>

                <form id="user-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="first_name">Nombre: <span class="required">*</span></label>
                            <input type="text" id="first_name" placeholder="Ej: Juan" required>
                            <small class="error-message" id="first_name-error"></small>
                        </div>
                        <div class="form-group">
                            <label for="last_name">Apellido: <span class="required">*</span></label>
                            <input type="text" id="last_name" placeholder="Ej: Pérez" required>
                            <small class="error-message" id="last_name-error"></small>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email: <span class="required">*</span></label>
                        <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                        <small class="error-message" id="email-error"></small>
                    </div>

                    <div class="form-group" id="password-group">
                        <label for="password">Contraseña: <span class="required">*</span></label>
                        <input type="password" id="password" placeholder="Mínimo 6 caracteres">
                        <small>Dejar en blanco si no deseas cambiar la contraseña al editar</small>
                        <small class="error-message" id="password-error"></small>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="phone">Teléfono:</label>
                            <input type="tel" id="phone" placeholder="+56912345678">
                            <small class="error-message" id="phone-error"></small>
                        </div>
                        <div class="form-group">
                            <label for="role">Rol: <span class="required">*</span></label>
                            <select id="role" required>
                                <option value="">Selecciona un rol</option>
                                <option value="admin">Administrador</option>
                                <option value="user">Usuario</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary" id="submit-btn">Registrar</button>
                        <button type="button" class="btn-secondary" onclick="closeModal()">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="users.js"></script>
</body>
</html>
