<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema Académico</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="../../shared/css/global.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="academic-logo">
                <div class="logo-icon">🎓</div>
                <h1>Sistema Académico</h1>
            </div>
            <p class="subtitle">Gestión Educativa Integral</p>
        </div>

        <div class="login-form-container">
            <div class="form-header">
                <h2>Acceso al Sistema</h2>
                <div class="header-decoration"></div>
            </div>

            <form id="login-form" class="login-form" autocomplete="off">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="usuario@institucion.edu" required />
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Ingrese su contraseña" required />
                </div>

                <div class="form-actions">
                    <button type="submit" id="button-primary" class="btn-primary">Ingresar al Sistema</button>
                </div>

                <div class="form-footer">
                    <a href="#" class="forgot-link">¿Olvidó su contraseña?</a>
                </div>

                <div id="errorMessage" class="error-message"></div>
            </form>
        </div>

        <div class="academic-footer">
            <div class="footer-decoration"></div>
            <p>&copy; 2024 Sistema de Gestión Académica</p>
            <div class="footer-decoration"></div>
        </div>
    </div>

    <script src="./auth.js"></script>
</body>
</html>
