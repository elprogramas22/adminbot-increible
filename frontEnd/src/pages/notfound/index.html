<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada - Sistema Académico</title>
    <link rel="stylesheet" href="../../shared/css/global.css">
    <link rel="stylesheet" href="notfound.css">
</head>
<body>
    <div class="notfound-container">
        <div class="notfound-content">
            <div class="error-code">404</div>
            <h1 class="error-title">Página no encontrada</h1>
            <p class="error-description">
                La página solicitada no se encuentra disponible en el sistema académico.
                <br>
                Verifique la dirección URL o regrese al panel principal.
            </p>
            <div class="error-actions">
                <a href="/dashboard" class="btn-primary">Volver al Panel Principal</a>
                <a href="javascript:history.back()" class="btn-secondary">Página Anterior</a>
            </div>
        </div>
        <div class="academic-decoration">
            <div class="decoration-line"></div>
            <div class="decoration-text">Sistema de Gestión Académica</div>
            <div class="decoration-line"></div>
        </div>
    </div>
</body>
</html>
